services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: fte_postgres
    environment:
      POSTGRES_USER: fte_user
      POSTGRES_PASSWORD: fte_password
      POSTGRES_DB: fte_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fte_user -d fte_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
