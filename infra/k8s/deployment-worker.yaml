apiVersion: apps/v1
kind: Deployment
metadata:
  name: fte-worker
  namespace: fte
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fte
      component: worker
  template:
    metadata:
      labels:
        app: fte
        component: worker
    spec:
      containers:
      - name: fte-worker
        image: fte-api:latest
        imagePullPolicy: Never
        command: ["uv", "run", "python", "workers/message_processor.py"]
        envFrom:
        - configMapRef:
            name: fte-config
        - secretRef:
            name: fte-secrets
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
