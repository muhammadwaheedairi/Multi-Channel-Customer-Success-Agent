apiVersion: v1
kind: Service
metadata:
  name: fte-api-service
  namespace: fte
spec:
  selector:
    app: fte
    component: api
  ports:
  - port: 80
    targetPort: 8000
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: fte-portal-service
  namespace: fte
spec:
  selector:
    app: fte
    component: portal
  ports:
  - port: 3000
    targetPort: 3000
  type: ClusterIP
